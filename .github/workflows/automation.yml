name: ShopEase Selenium Automation Pipeline

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}

      - name: Verify Project Folder
        run: ls -la

      - name: Run Selenium TestNG Tests
        run: |
          cd "automation-excerise- testing -project"
          mvn clean test

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-report
          path: |
            automation-excerise- testing -project/test-output
            automation-excerise- testing -project/reports
